# The docker-sandbox topology under test (loom installed from the local repo,
# upstream faked): CI asserts the jail actually jails.
networks:
  jail:
    internal: true
  egress: {}

services:
  fake-api:
    image: python:3.12-slim
    command: python /ci/fake_api.py --port 9000
    networks: [egress]
    volumes:
      - ./:/ci:ro

  proxy:
    image: python:3.12-slim
    # One line on purpose: YAML's folded scalar KEEPS newlines on more-indented
    # continuation lines, and sh -c treats those as command separators -- the
    # proxy once ran with default args (and hit the real API) because of that.
    command: sh -c "pip install -q /src && loom proxy --host 0.0.0.0 --port 8788 --target http://fake-api:9000 --save /traces/session.loom.json"
    environment:
      PYTHONUNBUFFERED: "1"   # container stdout is block-buffered otherwise
    networks: [jail, egress]
    volumes:
      - ../../..:/src:ro
      - ./traces:/traces
    depends_on: [fake-api]

  agent:
    image: python:3.12-slim
    command: python /ci/agent_check.py
    environment:
      ANTHROPIC_BASE_URL: http://proxy:8788
    networks: [jail]
    volumes:
      - ./:/ci:ro
    depends_on: [proxy]
