# The docker-sandbox topology under test (loom installed from the local repo,
# upstream faked): CI asserts the jail actually jails.
networks:
  jail:
    internal: true
  egress: {}

services:
  fake-api:
    image: python:3.12-slim
    command: python /ci/fake_api.py --port 9000
    networks: [egress]
    volumes:
      - ./:/ci:ro

  proxy:
    image: python:3.12-slim
    command: >
      sh -c "pip install -q /src &&
             loom proxy --host 0.0.0.0 --port 8788
                  --target http://fake-api:9000
                  --save /traces/session.loom.json"
    environment:
      PYTHONUNBUFFERED: "1"   # container stdout is block-buffered otherwise
    networks: [jail, egress]
    volumes:
      - ../../..:/src:ro
      - ./traces:/traces
    depends_on: [fake-api]

  agent:
    image: python:3.12-slim
    command: python /ci/agent_check.py
    environment:
      ANTHROPIC_BASE_URL: http://proxy:8788
    networks: [jail]
    volumes:
      - ./:/ci:ro
    depends_on: [proxy]
