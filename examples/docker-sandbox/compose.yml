# The docker sandbox: the loom proxy is the agent's ONLY way out.
#
#   jail   -- internal network: no route to the outside world
#   egress -- ordinary bridge: only the proxy lives on both
#
# The agent can resolve exactly one thing that leads anywhere: the proxy.
# Every model exchange is recorded (and screened, if you add shield flags);
# everything else is "network unreachable".
#
#   docker compose up            # then: docker compose run agent
#   ls traces/                   # session.loom.json appears as the agent talks

networks:
  jail:
    internal: true
  egress: {}

services:
  proxy:
    image: python:3.12-slim
    command: >
      sh -c "pip install -q loom-harness &&
             loom proxy --host 0.0.0.0 --port 8788
                  --save /traces/session.loom.json
                  --deny 'Read(*.env*)'"
    networks: [jail, egress]
    volumes:
      - ./traces:/traces

  agent:
    # Replace with your agent's image; anything that speaks the Anthropic
    # (or OpenAI: add --target to the proxy) API works unmodified.
    image: your-agent-image
    environment:
      ANTHROPIC_BASE_URL: http://proxy:8788
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    networks: [jail]
    depends_on: [proxy]
