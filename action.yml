name: 'Loom Agent CI'
description: >-
  Snapshot testing for AI agents: replay recorded traces against the changed
  configuration and post the impact report on the PR. Dry mode is free (no
  API calls) -- it detects exactly which recorded runs your change touches.
author: 'evanl666'
branding:
  icon: 'rewind'
  color: 'purple'

inputs:
  traces:
    description: 'Trace files or directories of *.loom.json (space-separated)'
    required: true
  agent:
    description: 'Where to find the agent: module:attr (an Agent instance or a zero-arg factory)'
    required: true
  live:
    description: 'Re-run affected conversations to show HOW outputs change (costs API calls)'
    default: 'false'
  comment:
    description: 'Post (and keep updating) the impact report as a PR comment'
    default: 'true'
  install:
    description: 'pip install loom-harness first (set false if an earlier step already installed it)'
    default: 'true'
  fail-on-impact:
    description: 'Fail the check when any recorded run is affected'
    default: 'true'
  cost:
    description: >-
      Compare estimated input-token cost against the PR base branch and add a
      cost line to the report ("this change makes your agent 12% more
      expensive"). Free -- no API calls. Best-effort: skipped silently when
      either branch cannot be sized. Also compares the agent's tool inventory
      across branches ("this change grants the agent new tool(s): ...").
    default: 'true'
  studio:
    description: >-
      Upload the affected traces as Studio HTML (a workflow artifact) and link
      it from the PR comment, so reviewers can scrub through exactly the runs
      this change touches.
    default: 'true'

outputs:
  affected:
    description: '"true" when any recorded run is affected by the change'
    value: ${{ steps.impact.outputs.affected }}

runs:
  using: 'composite'
  steps:
    - name: Install loom-harness
      if: inputs.install == 'true'
      shell: bash
      run: pip install --quiet loom-harness

    - name: Replay recorded traces against the new configuration
      id: impact
      shell: bash
      env:
        TRACES: ${{ inputs.traces }}
        AGENT: ${{ inputs.agent }}
        LIVE: ${{ inputs.live }}
      run: |
        set +e
        args=(impact)
        for t in $TRACES; do args+=("$t"); done
        args+=(--agent "$AGENT")
        if [ "$LIVE" = "true" ]; then args+=(--live); fi
        loom "${args[@]}" --json "$RUNNER_TEMP/loom-impact-head.json" > loom-impact-report.txt 2>&1
        code=$?
        cat loom-impact-report.txt
        if [ $code -eq 1 ]; then echo "affected=true" >> "$GITHUB_OUTPUT"; else echo "affected=false" >> "$GITHUB_OUTPUT"; fi
        if [ $code -gt 1 ]; then exit $code; fi

    - name: Compare input cost with the base branch
      if: inputs.cost == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        TRACES: ${{ inputs.traces }}
        AGENT: ${{ inputs.agent }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
      # Best-effort throughout: any failure just means no cost/tools line.
      run: |
        set +e
        [ -f "$RUNNER_TEMP/loom-impact-head.json" ] || exit 0
        args=(impact)
        for t in $TRACES; do args+=("$t"); done
        args+=(--agent "$AGENT")

        git fetch --quiet --depth=1 origin "$BASE_SHA" > /dev/null 2>&1
        git worktree add --quiet --force "$RUNNER_TEMP/loom-base" "$BASE_SHA" > /dev/null 2>&1 || exit 0
        (cd "$RUNNER_TEMP/loom-base" && \
          loom "${args[@]}" --json "$RUNNER_TEMP/loom-impact-base.json") > /dev/null 2>&1
        [ -f "$RUNNER_TEMP/loom-impact-base.json" ] || exit 0

        python3 -c "import os; from loom.impact import cost_delta_files; tmp = os.environ['RUNNER_TEMP']; print(cost_delta_files(tmp + '/loom-impact-base.json', tmp + '/loom-impact-head.json'))" > loom-cost-line.txt 2>/dev/null
        python3 -c "
        import json, os
        from loom.impact import tools_delta
        tmp = os.environ['RUNNER_TEMP']
        base = json.load(open(tmp + '/loom-impact-base.json'))
        head = json.load(open(tmp + '/loom-impact-head.json'))
        print(tools_delta(base, head))
        " > loom-tools-line.txt 2>/dev/null
        if [ -s loom-cost-line.txt ]; then echo "cost: $(cat loom-cost-line.txt)"; fi
        if [ -s loom-tools-line.txt ]; then echo "tools: $(cat loom-tools-line.txt)"; fi
        exit 0

    - name: Export affected traces for Studio
      id: studio
      if: inputs.studio == 'true' && steps.impact.outputs.affected == 'true'
      shell: bash
      run: |
        set +e
        [ -f "$RUNNER_TEMP/loom-impact-head.json" ] || exit 0
        mkdir -p loom-studio
        python3 -c "
        import json, os
        head = json.load(open(os.environ['RUNNER_TEMP'] + '/loom-impact-head.json'))
        for i in head['impacts']:
            if i.get('verdict') not in (None, 'unchanged'):
                print(i['path'])
        " | while read -r trace; do
          [ -f "$trace" ] && loom export "$trace" -o "loom-studio/$(basename "${trace%.loom.json}").html"
        done
        if [ -n "$(ls -A loom-studio 2>/dev/null)" ]; then
          echo "exported=true" >> "$GITHUB_OUTPUT"
        fi
        exit 0

    - name: Upload the Studio views
      if: steps.studio.outputs.exported == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: loom-studio
        path: loom-studio/
        if-no-files-found: ignore

    - name: Post the report on the PR
      if: inputs.comment == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        AFFECTED: ${{ steps.impact.outputs.affected }}
        EXPORTED: ${{ steps.studio.outputs.exported }}
        REPO: ${{ github.repository }}
        PR: ${{ github.event.pull_request.number }}
        RUN_ID: ${{ github.run_id }}
      run: |
        marker='<!-- loom-impact-report -->'
        if [ "$AFFECTED" = "true" ]; then
          head='### ❌ Loom: this change affects recorded agent runs'
        else
          head='### ✅ Loom: no recorded agent runs affected'
        fi
        {
          echo "$marker"
          echo "$head"
          echo
          echo '```'
          cat loom-impact-report.txt
          echo '```'
          if [ -s loom-cost-line.txt ]; then
            echo
            echo "💸 $(cat loom-cost-line.txt)"
          fi
          if [ -s loom-tools-line.txt ]; then
            echo
            echo "🧰 $(cat loom-tools-line.txt)"
          fi
          if [ "$EXPORTED" = "true" ]; then
            echo
            echo "🔍 [Scrub through the affected runs in Studio](https://github.com/$REPO/actions/runs/$RUN_ID#artifacts) (\`loom-studio\` artifact)"
          fi
        } > loom-comment.md
        existing=$(gh api "repos/$REPO/issues/$PR/comments" \
          --jq "[.[] | select(.body | startswith(\"$marker\"))][0].id" 2>/dev/null || true)
        if [ -n "$existing" ] && [ "$existing" != "null" ]; then
          gh api -X PATCH "repos/$REPO/issues/comments/$existing" -F body=@loom-comment.md > /dev/null
        else
          gh pr comment "$PR" --repo "$REPO" --body-file loom-comment.md
        fi

    - name: Fail when recorded runs are affected
      if: inputs.fail-on-impact == 'true' && steps.impact.outputs.affected == 'true'
      shell: bash
      run: |
        echo "Recorded agent runs are affected by this change (see report above)."
        exit 1
