name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Run offline examples
        run: |
          python examples/01_hello.py
          python examples/02_record_replay_fork_bisect.py
          python examples/04_subagents.py
          python examples/05_sweep_diff.py
          python examples/06_conversation.py
          python examples/07_human_in_the_loop.py
          python examples/08_checkup_heal.py
