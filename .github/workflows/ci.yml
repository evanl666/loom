name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  version-consistency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: __version__ == pyproject == tag
        run: |
          pip install -e . --quiet
          python - <<'EOF'
          import os, re, sys
          import loom
          pyproject = re.search(r'^version = "([^"]+)"',
                                open("pyproject.toml").read(), re.M).group(1)
          assert loom.__version__ == pyproject, \
              f"loom.__version__ {loom.__version__} != pyproject {pyproject}"
          ref = os.environ.get("GITHUB_REF", "")
          if ref.startswith("refs/tags/v"):
              tag = ref.removeprefix("refs/tags/v")
              assert pyproject == tag, f"pyproject {pyproject} != tag {tag}"
          # No STALE hardcoded version in the README (a common source of user
          # confusion). Prose about old releases is fine; a "loom-harness==X.Y.Z"
          # pin or a "vX.Y.Z" that isn't the current one is not.
          readme = open("README.md").read()
          pins = re.findall(r'loom-harness==(\d+\.\d+\.\d+)', readme)
          stale = [p for p in pins if p != pyproject]
          assert not stale, f"README pins stale version(s) {stale} (current {pyproject})"
          print(f"version consistent: {pyproject}")
          EOF

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q
      - name: Run offline examples
        run: |
          python examples/01_hello.py
          python examples/02_record_replay_fork_bisect.py
          python examples/04_subagents.py
          python examples/05_sweep_diff.py
          python examples/06_conversation.py
          python examples/07_human_in_the_loop.py
          python examples/08_checkup_heal.py
          python examples/09_durable_runs.py
          python examples/10_policy.py
          python examples/11_structured_output.py
          python examples/12_impact.py
      - name: Flight-recorder demo (five acts, offline)
        run: bash examples/flight-recorder/demo.sh

  docker-sandbox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: The jail jails (egress blocked, proxy records)
        run: bash examples/docker-sandbox/ci/check.sh
      - name: Install loom for the container check
        run: pip install -e .
      - name: loom record --container records a Dockerized agent
        run: bash examples/docker-sandbox/ci/container_check.sh
